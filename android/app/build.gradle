plugins {
    id "com.android.application"
    id "kotlin-android"
    id "dev.flutter.flutter-gradle-plugin"
}

import java.util.Properties
import java.io.FileInputStream

def keystoreProperties = new Properties()
def keystorePropertiesFile = rootProject.file('key.properties')
if (keystorePropertiesFile.exists()) {
    keystoreProperties.load(new FileInputStream(keystorePropertiesFile))
}

android {
    namespace = "com.dt.videotoolkit"
    compileSdk = flutter.compileSdkVersion
    ndkVersion = "27.0.12077973"

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_17
        targetCompatibility JavaVersion.VERSION_17
    }

    kotlinOptions {
        jvmTarget = "17"
    }

    defaultConfig {
        applicationId = "com.dt.videotoolkit"
        minSdk = 24
        targetSdk = flutter.targetSdkVersion
        versionCode = flutter.versionCode
        versionName = flutter.versionName
        ndk {
            abiFilters.addAll(["arm64-v8a", "armeabi-v7a"])
        }
        // permission_handler: 只启用应用需要的权限，其余全部禁用
        // 避免声明 MANAGE_EXTERNAL_STORAGE 等不需要的权限导致 Google Play 拒审
        manifestPlaceholders += [
            PERMISSION_PHOTOS : '1',          // READ_MEDIA_IMAGES + READ_MEDIA_VIDEO (Android 13+)
            PERMISSION_STORAGE : '1',          // READ/WRITE_EXTERNAL_STORAGE (Android 12-)
            PERMISSION_NOTIFICATION : '1',     // POST_NOTIFICATIONS
        ]
    }

    signingConfigs {
        release {
            keyAlias keystoreProperties['keyAlias']
            keyPassword keystoreProperties['keyPassword']
            storeFile file(keystoreProperties['storeFile'])
            storePassword keystoreProperties['storePassword']
        }
    }

    buildTypes {
        release {
            minifyEnabled false
            shrinkResources false
            proguardFiles getDefaultProguardFile('proguard-android-optimize.txt'), 'proguard-rules.pro'
            signingConfig signingConfigs.release
        }
    }
}

flutter {
    source = "../.."
}

dependencies {
}